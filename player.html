<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - Supervisores</title>
    <link rel="icon" type="image/gif" href="https://www.habbo.com.br/habbo-imaging/badge/b10134s12017s43014t12104s170129cb6c41f26a37e0c3192016b851550a7.gif">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sup-neon: #fbbf24;
            --glass-bg: #141419;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: #09090b;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .player-container {
            width: 100%;
            height: 100%;
            background: #1a1a24;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .header-title {
            color: var(--sup-neon);
            margin: 0 0 15px 0;
            font-size: 18px;
            text-transform: uppercase;
        }

        .avatar-box {
            width: 85px; 
            height: 85px; 
            background: radial-gradient(circle, rgba(251,191,36,0.3) 0%, rgba(0,0,0,0.9) 100%); 
            border: 2px solid var(--sup-neon); 
            border-radius: 50%; 
            margin: 0 auto 15px auto; 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 0 15px rgba(251,191,36,0.4);
        }

        .avatar-img {
            position: absolute; 
            bottom: -25px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85px;
        }

        .info-box {
            background: rgba(0,0,0,0.5); 
            border: 1px solid var(--glass-border); 
            border-radius: 8px; 
            padding: 10px 15px; 
            margin-bottom: 20px;
            width: 90%;
            box-sizing: border-box;
        }

        .info-box h3 { margin: 0 0 5px 0; font-size: 16px; }
        .info-box p { color: #ccc; margin: 0; font-size: 13px; }

        .controls {
            display: flex; 
            justify-content: center; 
            gap: 15px;
        }

        .btn-action {
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: #2a2a35; 
            color: #fff; 
            border: 1px solid var(--glass-border); 
            font-size: 16px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s;
        }

        .btn-action:hover { background: #3a3a45; border-color: var(--sup-neon); color: var(--sup-neon); }
        .btn-action.play-btn { background: var(--sup-neon); color: #000; border: none; }
        .btn-action.play-btn:hover { transform: scale(1.05); background: #d97706; color: #fff; }
    </style>
</head>
<body>

    <div class="player-container">
        <h2 class="header-title"><i class="fas fa-compact-disc"></i> Rádio Oficial</h2>
        
        <div class="info-box">
            <div class="avatar-box">
                 <img id="alt-avatar" class="avatar-img" src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=AutoDJ&action=std&direction=2&head_direction=3&gesture=sml&size=l">
            </div>
            <h3>Locutor: <span id="alt-locutor" style="color: var(--sup-neon);">AutoDJ</span></h3>
            <p>Programa: <span id="alt-programa" style="color: #fff; font-weight: bold;">Ao Vivo</span></p>
        </div>

        <div class="controls">
            <button class="btn-action play-btn" onclick="togglePlay()" title="Tocar / Pausar">
                <i class="fas fa-pause" id="icon-play"></i>
            </button>
            <button class="btn-action" onclick="altVolDown()" title="Diminuir Volume"><i class="fas fa-volume-down"></i></button>
            <button class="btn-action" onclick="altVolUp()" title="Aumentar Volume"><i class="fas fa-volume-up"></i></button>
        </div>

        <audio id="stream-player" preload="auto">
            <source id="stream-source" src="" type="audio/mpeg">
        </audio>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script> <script>
        const audioPlayer = document.getElementById('stream-player');
        const iconPlay = document.getElementById('icon-play');
        let radioInterval;
        let userIntentionallyPaused = false; 

        // API para pegar nome da música
        async function buscarStatusRadio() {
            try {
                const response = await fetch('/api/ouvintes');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('alt-programa').innerText = data.musica || "Ao Vivo";
                }
            } catch (error) {
                console.error("Erro na API da Rádio.");
            }
        }

        function iniciarMonitoramentoRadio() {
            if(radioInterval) clearInterval(radioInterval);
            buscarStatusRadio(); 
            radioInterval = setInterval(buscarStatusRadio, 15000); 
        }

        function togglePlay() {
            if (audioPlayer.paused) {
                userIntentionallyPaused = false;
                audioPlayer.play().then(() => iconPlay.classList.replace('fa-play', 'fa-pause')).catch(e => console.error(e));
            } else {
                userIntentionallyPaused = true;
                audioPlayer.pause();
                iconPlay.classList.replace('fa-pause', 'fa-play');
            }
        }

        function autoPlayStandby() {
            if (userIntentionallyPaused) return; 
            let playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    iconPlay.classList.replace('fa-play', 'fa-pause');
                }).catch(e => {
                    iconPlay.classList.replace('fa-pause', 'fa-play'); // Atualiza icone se bloqueado
                    const startAudioOnInteract = () => {
                        if (audioPlayer.paused && !userIntentionallyPaused) {
                            audioPlayer.play().then(() => iconPlay.classList.replace('fa-play', 'fa-pause'));
                        }
                        document.removeEventListener('click', startAudioOnInteract);
                    };
                    document.addEventListener('click', startAudioOnInteract);
                });
            }
        }

        function altVolUp() {
            let novoVol = audioPlayer.volume + 0.1;
            if (novoVol > 1) novoVol = 1;
            audioPlayer.volume = novoVol;
        }

        function altVolDown() {
            let novoVol = audioPlayer.volume - 0.1;
            if (novoVol < 0) novoVol = 0;
            audioPlayer.volume = novoVol;
        }

        document.addEventListener("DOMContentLoaded", () => {
            audioPlayer.volume = 0.5; // Volume inicial 50%
            iniciarMonitoramentoRadio();

            // Puxa as infos do Firebase para manter o popup sincronizado com o site
            window.db.collection("sistema").doc("pagina_eventos").onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    
                    let nick = data.locutorAtual || "AutoDJ";
                    document.getElementById('alt-locutor').innerText = nick;
                    document.getElementById('alt-avatar').src = `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${nick}&action=std&direction=2&head_direction=3&gesture=sml&size=l&time=${new Date().getTime()}`;

                    let urlBanco = data.radioUrl || "https://stream.zeno.fm/c1ct7nz68f8uv";
                    let sourceElem = document.getElementById('stream-source');
                    
                    if(urlBanco && sourceElem.getAttribute('src') !== urlBanco) {
                        sourceElem.src = urlBanco;
                        audioPlayer.load();
                        autoPlayStandby();
                    }
                }
            });
        });
    </script>
</body>
</html>
